{{ define "main" }}
  <article class="post-single">
    <header class="post-header">
      {{ if .Title }}
        <h1 class="post-title">{{ .Title }}</h1>
      {{ end }}
      <time class="post-date" datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date | time.Format ":date_medium" }}</time>
    </header>

    <div class="post-content">
      {{ .Content }}
    </div>
  </article>
{{ end }}
